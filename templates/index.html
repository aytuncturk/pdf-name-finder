<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>PDF Name Finder | Yazılım Medya</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: url("/static/bg.jpg") no-repeat center center fixed;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .card {
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(6px);
            padding: 40px;
            border-radius: 20px;
            width: 90%;
            max-width: 900px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
            text-align: center;
        }

        h1 {
            margin-bottom: 10px;
        }

        p.description {
            color: #555;
            margin-bottom: 40px;
        }

        .features {
            display: flex;
            justify-content: space-between;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .feature {
            flex: 1;
            min-width: 150px;
            margin: 10px;
        }

        .upload-container {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .upload-box {
            flex: 1;
            min-width: 250px;
            border: 2px dashed #ccc;
            border-radius: 15px;
            padding: 40px 20px;
            cursor: pointer;
            transition: 0.3s;
        }

        .upload-box:hover {
            border-color: #6c3ff0;
            background: rgba(108,63,240,0.05);
        }

        .excel {
            border-color: #1ea64a;
        }

        .pdf {
            border-color: #e53935;
        }

        .upload-box h3 {
            margin-top: 10px;
        }

        button {
            margin-top: 30px;
            padding: 15px 40px;
            border-radius: 30px;
            border: none;
            background: linear-gradient(90deg,#5f2eea,#9b51e0);
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            opacity: 0.9;
        }

        .loading {
            margin-top: 15px;
            color: #5f2eea;
            display: none;
        }

        @media(max-width: 768px) {
            .upload-container {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

<div class="card">

    <h1>PDF Name Finder | Yazılım Medya</h1>
    <p class="description">
        Excel dosyanızdaki isimleri PDF içerisinde otomatik olarak tarar ve ilgili sayfa numaralarını listeler.
    </p>

    <div class="features">
        <div class="feature">📊 Excel Entegrasyonu</div>
        <div class="feature">📄 PDF Tarama + OCR</div>
        <div class="feature">⚡ Hızlı Sonuç</div>
    </div>

    <form id="uploadForm" enctype="multipart/form-data">

        <div class="upload-container">

            <div class="upload-box excel" onclick="document.getElementById('excel').click()">
                <div style="font-size:40px;">📊</div>
                <h3>Excel Dosyası (.xlsx)</h3>
                <p id="excelName" style="margin-top:10px;font-size:14px;color:#1ea64a;"></p>
            </div>

            <div class="upload-box pdf" onclick="document.getElementById('pdf').click()">
                <div style="font-size:40px;">📄</div>
                <h3>PDF Dosyası (.pdf)</h3>
                <p id="pdfName" style="margin-top:10px;font-size:14px;color:#e53935;"></p>
            </div>

        </div>

        <input type="file" id="excel" name="excel" hidden required>
        <input type="file" id="pdf" name="pdf" hidden required>

        <button type="submit">Tara</button>

        <div style="margin-top:15px;">
  <div id="progressContainer" style="display:none;">
    <div style="width:100%;background:#eee;border-radius:10px;">
      <div id="progressBar" 
           style="width:0%;height:12px;background:#6a5acd;border-radius:10px;">
      </div>
    </div>
    <p id="progressText" style="font-size:14px;margin-top:5px;"></p>
  </div>
</div>

        <div class="loading" id="loadingText">
            İşleniyor... Lütfen bekleyin.
        </div>

    </form>

</div>

<script>
    function showLoading(){
        document.getElementById("loadingText").style.display = "block";
    }
</script>
<script>
document.getElementById("uploadForm").addEventListener("submit", function(e) {
    e.preventDefault();

    const form = document.getElementById("uploadForm");
    const formData = new FormData(form);

    const xhr = new XMLHttpRequest();
    xhr.open("POST", "/search", true);

    const progressContainer = document.getElementById("progressContainer");
    const progressBar = document.getElementById("progressBar");
    const progressText = document.getElementById("progressText");

    progressContainer.style.display = "block";

    xhr.upload.onprogress = function(event) {
        if (event.lengthComputable) {
            const percent = (event.loaded / event.total) * 100;
            progressBar.style.width = percent + "%";
            progressText.innerText = Math.round(percent) + "% uploaded";
        }
    };

    xhr.onload = function() {
    if (xhr.status === 200) {
        const blob = new Blob([xhr.response], { type: "text/plain" });
        const link = document.createElement("a");
        link.href = window.URL.createObjectURL(blob);
        link.download = "sonuc.txt";
        link.click();

        progressText.innerText = "Processing complete.";
        loadUploads();
    } else {
        progressText.innerText = "Upload failed.";
    }
};

xhr.responseType = "blob";

    xhr.send(formData);
});
</script>
<script>
function loadUploads() {
    fetch("/uploads")
    .then(res => res.json())
    .then(data => {
        const list = document.getElementById("uploadList");
        list.innerHTML = "";
        data.forEach(file => {
            const li = document.createElement("li");
            li.innerText = `${file.name} - ${file.size_mb} MB - ${file.uploaded_at}`;
            list.appendChild(li);
        });
    });
}

window.onload = loadUploads;
</script>
<script>
    document.getElementById("excel").addEventListener("change", function() {
    document.getElementById("excelName").innerText = this.files[0].name;
});

document.getElementById("pdf").addEventListener("change", function() {
    document.getElementById("pdfName").innerText = this.files[0].name;
});
</script>
</body>
</html>
